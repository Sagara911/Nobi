<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Nobi 音频可视化壁纸</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
  /* 顶部一小条可拖动，方便原型期挪窗 */
  #drag { position: fixed; top: 0; left: 0; right: 0; height: 22px; -webkit-app-region: drag; z-index: 5; }
  #scene { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; left: 14px; top: 10px; z-index: 6;
    font: 12px/1.5 -apple-system, "Segoe UI", sans-serif; color: #cfe;
    text-shadow: 0 1px 3px #000; pointer-events: none; white-space: nowrap;
  }
  #err {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    color: #f88; font: 16px sans-serif; text-align: center; padding: 24px; background: #000c;
  }
</style>
</head>
<body>
<div id="drag"></div>
<div id="hud">启动中…</div>
<canvas id="scene"></canvas>
<div id="err"></div>

<script>
  // 把报错(含 three.js 着色器编译 console.error)显示到页面，避免默默黑屏。
  (function () {
    const box = document.getElementById('err');
    function show(msg) {
      box.style.display = 'flex';
      box.textContent = String(msg).slice(0, 1500);
    }
    window.addEventListener('error', (e) => show('JS 错误: ' + (e.message || e.error)));
    const origErr = console.error.bind(console);
    console.error = function (...a) {
      const s = a.join(' ');
      if (/shader|glsl|compile|program|webgl/i.test(s)) show('着色器/WebGL 错误:\n' + s);
      origErr(...a);
    };
  })();
</script>
<script src="vendor/three.r128.min.js"></script>
<script>
  // three.js 没加载出来（内核不支持等）→ 明确报出来，别默默黑屏。
  if (!window.THREE) {
    const e = document.getElementById('err');
    e.style.display = 'flex';
    e.textContent = 'three.js 未加载 —— WebGL 内核不可用？';
  }
</script>
<script src="audio.js"></script>
<script src="shaders.js"></script>
<script src="particles.js"></script>
<script src="boot.js"></script>
</body>
</html>
