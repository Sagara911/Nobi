# Auto release: pushing a v* tag builds, signs, uploads latest.json, and creates a GitHub Release.
# Local entrypoint: node scripts/release.mjs <version>
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY          key content from ~/.tauri/nobi-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD key password
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Validate updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is empty. Store the key content, not a file path or secret name."
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty."
          }
          try {
            $decoded = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($env:TAURI_SIGNING_PRIVATE_KEY.Trim()))
          } catch {
            throw "TAURI_SIGNING_PRIVATE_KEY must be the base64 updater key content from nobi-updater.key."
          }
          if ($decoded -notmatch "encrypted secret key") {
            throw "TAURI_SIGNING_PRIVATE_KEY does not look like the Nobi updater private key."
          }

      # 从 CHANGELOG.md 取当前 tag 的条目，作为 Release 说明 + 应用内更新弹窗的内容。
      # tauri-action 会把 releaseBody 同时写进 GitHub Release 和 latest.json 的 notes。
      - name: Build release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $body = @()
          $in = $false
          foreach ($l in (Get-Content CHANGELOG.md -Encoding utf8)) {
            if ($l -match "^##\s+$([regex]::Escape($tag))\s*$") { $in = $true; continue }
            elseif ($in -and $l -match "^##\s") { break }
            elseif ($in) { $body += $l }
          }
          $text = ($body -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($text)) { $text = "Nobi $tag" }
          $d = "NOTES_" + [guid]::NewGuid().ToString("N")
          "notes<<$d" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8
          $text       | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8
          "$d"        | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Nobi ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
